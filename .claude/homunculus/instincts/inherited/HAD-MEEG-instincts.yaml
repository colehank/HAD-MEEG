# HAD MEEG Workflow Update Shared Config And Propagate To Scripts

## Action

Follow the update-shared-config-and-propagate-to-scripts workflow:
1. Update src/config.py to add or modify config variables (e.g., resource roots, environment variable support).
2. Update .env_example to document or remove relevant environment variables.
3. Update scripts/step-*.py files to use the new/updated config variables instead of hardcoded paths or old config fields.
4. Update pyproject.toml or src/__init__.py if project structure or exports change.
5. Clean up unused imports or code left from previous config patterns.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/config.py, .env_example, scripts/step-*.py

