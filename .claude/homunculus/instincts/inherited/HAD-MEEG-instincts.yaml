# HAD MEEG Workflow Project Installation And Import Path Upgrade

## Action

Follow the project-installation-and-import-path-upgrade workflow:
1. Update pyproject.toml to add or change build backend and package config.
2. Remove sys.path manipulation boilerplate from all scripts.
3. Regenerate uv.lock to reflect new editable install and dependencies.
4. Test that scripts can import from src without sys.path hacks.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: pyproject.toml, scripts/step-*.py, uv.lock

